version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: instalily
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE=http://localhost:8000/api
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - .:/app

volumes:
  postgres_data:
